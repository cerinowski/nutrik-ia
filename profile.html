<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Nutrik.IA - Editar Perfil</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-card {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1.5px solid #000;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-goal {
            border: 1.5px solid #E5E7EB;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            background: #fff;
            width: 100%;
        }

        .btn-goal i,
        .btn-goal span {
            pointer-events: none;
        }

        .btn-goal i {
            width: 20px;
            height: 20px;
            color: #666;
        }

        .btn-goal.active {
            background: var(--primary);
            border-color: #000;
            font-weight: 700;
            transform: scale(1.05);
        }

        .btn-goal.active i {
            color: #000;
        }

        .btn-goal:hover:not(.active) {
            background: #f9f9f9;
            border-color: #000;
        }
    </style>
</head>

<body style="background: #F9FAFB;">
    <header class="app-header">
        <div class="logo-container compact">
            <span class="logo-text">nutrik</span>
            <span class="logo-bubble">.ia</span>
        </div>
        <div class="nav-actions">
            <a href="dashboard.html" class="btn-chat-nav" style="background: #F3F4F6; color: #000;">
                <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i> Voltar
            </a>
        </div>
    </header>

    <div class="profile-card">
        <h1 style="font-family: 'Outfit'; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
            <i data-lucide="user-cog" style="color: var(--primary);"></i> Seu Perfil
        </h1>
        <form id="profile-form">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="full_name" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Idade</label>
                    <input type="number" id="age" required>
                </div>
                <div class="form-group">
                    <label>Gênero</label>
                    <select id="gender" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #000;">
                        <option value="male">Masculino</option>
                        <option value="female">Feminino</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Peso Atual (kg)</label>
                    <input type="number" id="current_weight" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Meta de Peso (kg)</label>
                    <input type="number" id="target_weight" step="0.1" required>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="height" required>
                </div>
                <div class="form-group">
                    <label>Nível de Atividade</label>
                    <select id="activity_level"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #000;" required>
                        <option value="sedentary">Sedentário (Sem exercício)</option>
                        <option value="light">Leve (1 a 3 dias/sem)</option>
                        <option value="moderate">Moderado (3 a 5 dias/sem)</option>
                        <option value="active">Ativo (6 a 7 dias/sem)</option>
                        <option value="very_active">Muito Ativo (Atleta/2x dia)</option>
                    </select>
                </div>
            </div>
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px;">Objetivo</label>
            <div id="goal-container"
                style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                <button type="button" class="btn-goal" data-goal="lose" onclick="setGoal('lose')">
                    <i data-lucide="trending-down"></i>
                    <span>Emagrecer</span>
                </button>
                <button type="button" class="btn-goal" data-goal="maintain" onclick="setGoal('maintain')">
                    <i data-lucide="minus"></i>
                    <span>Manter</span>
                </button>
                <button type="button" class="btn-goal" data-goal="gain" onclick="setGoal('gain')">
                    <i data-lucide="trending-up"></i>
                    <span>Ganhar</span>
                </button>
            </div>

            <!-- Metas Manuais (Nutricionista) -->
            <div
                style="background: #F3F4F6; padding: 20px; border-radius: 16px; margin-bottom: 24px; border: 1.5px dashed #000;">
                <h3
                    style="font-family: 'Outfit'; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="settings-2" style="width: 18px; height: 18px;"></i> Metas Manuais (Nutricionista)
                </h3>
                <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Fez bioimpedância ou nutricionista passou
                    metas
                    exatas? Preencha abaixo para sobrepor o cálculo da IA.</p>

                <div class="form-group">
                    <label>Taxa Metabólica Basal (Calorias/Dia)</label>
                    <input type="number" id="manual_calories" placeholder="Ex: 2200">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Proteína (g)</label>
                        <input type="number" id="manual_protein" placeholder="Ex: 160">
                    </div>
                    <div class="form-group">
                        <label>Carboidratos (g)</label>
                        <input type="number" id="manual_carbs" placeholder="Ex: 200">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Gorduras (g)</label>
                        <input type="number" id="manual_fats" placeholder="Ex: 70">
                    </div>
                </div>
                <div id="macro-validation-msg"
                    style="display: none; font-size: 13px; font-weight: 700; margin-top: 10px; padding: 12px; border-radius: 12px; background: #fff; border: 1.5px solid #ddd; text-align: center;">
                </div>
                <p style="font-size: 11px; color: #999; margin-top: 5px;">* Deixe em branco para usar o cálculo
                    automático.</p>
            </div>
            <button type="submit" class="btn-primary" id="save-btn"
                style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;">
                <i data-lucide="check-circle" style="width: 20px; height: 20px;"></i> Salvar Alterações
            </button>
            <button type="button" id="manage-billing-btn" class="btn-outline"
                style="width: 100%; display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; padding: 14px; border-radius: 12px; border: 1.5px solid #000; background: transparent; cursor: pointer; font-weight: 700; font-size: 16px;">
                <i data-lucide="credit-card" style="width: 20px; height: 20px;"></i> Gerenciar Assinatura
            </button>
            <a href="affiliate.html" class="btn-outline"
                style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; padding: 14px; border-radius: 12px; border: 1.5px solid #000; background: #fff; color: #000; text-decoration: none; font-weight: 700; font-size: 16px;">
                <i data-lucide="users" style="width: 20px; height: 20px;"></i> Seja um Afiliado
            </a>
        </form>
    </div>

    <script type="module" src="config.js"></script>
    <script>
        let selectedGoal = 'maintain';

        // Definição global para acesso via onclick
        window.setGoal = (goal) => {
            selectedGoal = goal;
            console.log('Selecionado:', selectedGoal);
            updateGoalUI();
            if (typeof window.suggestMacros === 'function') {
                window.suggestMacros();
            }
        };

        function updateGoalUI() {
            const goals = document.querySelectorAll('.btn-goal');
            goals.forEach(g => {
                if (g.getAttribute('data-goal') === selectedGoal) {
                    g.classList.add('active');
                } else {
                    g.classList.remove('active');
                }
            });
        }

        async function initProfile() {
            if (!window.supabaseClient) { setTimeout(initProfile, 50); return; }
            lucide.createIcons();
            const supabase = window.supabaseClient;
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) {
                document.getElementById('full_name').value = profile.full_name || '';
                document.getElementById('age').value = profile.age || '';
                document.getElementById('gender').value = profile.gender || 'male';
                document.getElementById('current_weight').value = profile.current_weight || '';
                document.getElementById('target_weight').value = profile.target_weight || '';
                document.getElementById('height').value = profile.height || '';
                document.getElementById('activity_level').value = profile.activity_level || 'light';
                selectedGoal = profile.goal || 'maintain';
                updateGoalUI();

                // Carregar metas manuais
                document.getElementById('manual_calories').value = profile.manual_calories || '';
                document.getElementById('manual_protein').value = profile.manual_protein || '';
                document.getElementById('manual_carbs').value = profile.manual_carbs || '';
                document.getElementById('manual_fats').value = profile.manual_fats || '';

                // Lógica de Pre-cálculo e Validação
                const mCal = document.getElementById('manual_calories');
                const mPro = document.getElementById('manual_protein');
                const mCarb = document.getElementById('manual_carbs');
                const mFat = document.getElementById('manual_fats');
                const vMsg = document.getElementById('macro-validation-msg');

                function validateMacros() {
                    const cals = parseFloat(mCal.value) || 0;
                    const pro = parseFloat(mPro.value) || 0;
                    const carb = parseFloat(mCarb.value) || 0;
                    const fat = parseFloat(mFat.value) || 0;

                    if (!cals) { vMsg.style.display = 'none'; return; }

                    const calcCals = (pro * 4) + (carb * 4) + (fat * 9);
                    const pct = (calcCals / cals) * 100;
                    vMsg.style.display = 'block';

                    if (Math.abs(pct - 100) < 1) {
                        vMsg.innerHTML = '✅ Macros perfeitos! 100% das calorias atingidas.';
                        vMsg.style.color = '#10B981';
                        vMsg.style.borderColor = '#10B981';
                    } else {
                        vMsg.innerHTML = `⚠️ Soma dos macros: ${Math.round(pct)}% das calorias. Ajuste para chegar a 100%.`;
                        vMsg.style.color = '#F59E0B';
                        vMsg.style.borderColor = '#F59E0B';
                    }
                }

                window.suggestMacros = function () {
                    const cals = parseFloat(mCal.value);
                    if (!cals) { vMsg.style.display = 'none'; return; }

                    let pP, cP, fP;
                    if (selectedGoal === 'lose') { pP = 0.40; cP = 0.30; fP = 0.30; }
                    else if (selectedGoal === 'gain') { pP = 0.25; cP = 0.50; fP = 0.25; }
                    else { pP = 0.30; cP = 0.40; fP = 0.30; }

                    mPro.value = Math.round((cals * pP) / 4);
                    mCarb.value = Math.round((cals * cP) / 4);
                    mFat.value = Math.round((cals * fP) / 9);
                    validateMacros();
                };

                mCal.addEventListener('input', window.suggestMacros);

                [mPro, mCarb, mFat].forEach(inp => inp.addEventListener('input', validateMacros));
                if (mCal.value) validateMacros();

                // Show Manage Billing button if user is premium
                if (profile.plan === 'premium') {
                    const billingBtn = document.getElementById('manage-billing-btn');
                    billingBtn.style.display = 'flex';
                    billingBtn.onclick = async () => {
                        billingBtn.innerHTML = '<i data-lucide="loader-2" style="width:20px;height:20px;animation:spin 1s linear infinite"></i> Aguarde...';
                        try {
                            const res = await fetch('/api/create-portal-session', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: session.user.email })
                            });
                            const data = await res.json();
                            if (data.url) {
                                window.location.href = data.url;
                            } else {
                                alert(data.error || 'Erro ao abrir painel.');
                                billingBtn.innerHTML = '<i data-lucide="credit-card" style="width: 20px; height: 20px;"></i> Gerenciar Assinatura';
                            }
                        } catch (err) {
                            alert('Erro de conexão ao portal.');
                            billingBtn.innerHTML = '<i data-lucide="credit-card" style="width: 20px; height: 20px;"></i> Gerenciar Assinatura';
                        }
                    };
                }
            }

            document.getElementById('profile-form').onsubmit = async (e) => {
                e.preventDefault();
                const saveBtn = document.getElementById('save-btn');
                saveBtn.disabled = true;
                saveBtn.textContent = 'Gravando...';

                const pData = {
                    id: session.user.id,
                    email: session.user.email,
                    full_name: document.getElementById('full_name').value,
                    age: parseInt(document.getElementById('age').value) || null,
                    gender: document.getElementById('gender').value,
                    current_weight: parseFloat(document.getElementById('current_weight').value) || null,
                    target_weight: parseFloat(document.getElementById('target_weight').value) || null,
                    height: parseInt(document.getElementById('height').value) || null,
                    activity_level: document.getElementById('activity_level').value,
                    goal: selectedGoal,
                    manual_calories: parseFloat(document.getElementById('manual_calories').value) || null,
                    manual_protein: parseFloat(document.getElementById('manual_protein').value) || null,
                    manual_carbs: parseFloat(document.getElementById('manual_carbs').value) || null,
                    manual_fats: parseFloat(document.getElementById('manual_fats').value) || null,
                    updated_at: new Date().toISOString()
                };

                // Atualiza perfil usando update ao invés de upsert para não resetar campos implícitos
                const { error } = await supabase.from('profiles').update(pData).eq('id', session.user.id);

                if (!error) {
                    // Também salva no histórico de peso para atualizar o gráfico no dashboard
                    if (pData.current_weight) {
                        await supabase.from('weight_history').insert({
                            user_id: session.user.id,
                            weight: pData.current_weight
                        });
                    }

                    alert('Seu perfil foi salvo com sucesso! 🚀');
                    window.location.href = 'dashboard.html';
                } else {
                    console.error('Erro Supabase:', error);
                    alert('Erro ao salvar no banco: ' + error.message);
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i data-lucide="check-circle" style="width: 20px; height: 20px;"></i> Salvar Alterações';
                    lucide.createIcons();
                }
            };
        }
        initProfile();
    </script>
</body>

</html>
